<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D 公式可视化</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>公式可视化 <span class="version" id="app-version"></span></h1>
        
        <div class="main-content">
            <div class="left-panel">
                <div class="input-section">
                    <label for="formula">输入方程:</label>
                    <div class="input-row">
                        <div class="preset-dropdown">
                            <button class="preset-dropdown-btn">
                                选择预设公式 ▼
                            </button>
                            <div id="preset-menu" class="preset-menu hidden">
                                <!-- 预设菜单内容由 JavaScript 动态生成 -->
                            </div>
                        </div>
                    </div>
                    <div class="input-row">
                        <span class="formula-prefix">y = </span>
                        <input type="text" id="formula" value="2x+1" placeholder="输入表达式，如: 2x+1">
                        <input type="color" id="line-color" value="#ff0000" title="选择线条颜色">
                        <select id="line-style" title="选择线条样式">
                            <option value="solid">实线</option>
                            <option value="dashed">虚线</option>
                            <option value="dotted">点线</option>
                        </select>
                        <button id="add-formula-btn">添加方程</button>
                    </div>
                </div>
                
                <div class="equations-list">
                    <h3>方程列表</h3>
                    <div id="equations-container"></div>
                    <div class="equations-actions">
                        <button class="action-btn show-all-btn">全部显示</button>
                        <button class="action-btn hide-all-btn">全部隐藏</button>
                        <button class="action-btn clear-btn">清空所有</button>
                    </div>
                </div>
                
                <div class="export-section">
                    <h3>导出选项</h3>
                    <div class="export-buttons">
                        <button onclick="exportImage()" class="export-btn png-btn">
                            <span class="btn-icon">🖼️</span>
                            <span>导出PNG</span>
                        </button>
                        <button onclick="exportPDF()" class="export-btn pdf-btn">
                            <span class="btn-icon">📄</span>
                            <span>导出PDF</span>
                        </button>
                        <button onclick="resetView()" class="action-btn reset-btn">
                            <span class="btn-icon">🔄</span>
                            <span>重置视图</span>
                        </button>
                        <button onclick="toggleHelp()" class="action-btn help-btn">
                            <span class="btn-icon">❓</span>
                            <span>帮助</span>
                        </button>
                    </div>
                </div>
                
                <div id="help-panel" class="help-panel hidden">
                    <h4>快捷键</h4>
                    <ul>
                        <li><kbd>Ctrl+A</kbd> - 聚焦输入框</li>
                        <li><kbd>Ctrl+E</kbd> - 导出图像</li>
                        <li><kbd>Ctrl+R</kbd> - 重置视图</li>
                        <li><kbd>Delete</kbd> - 删除选中方程</li>
                        <li><kbd>Esc</kbd> - 取消选中/关闭菜单</li>
                        <li><kbd>方向键</kbd> - 微调方程位置</li>
                        <li><kbd>Shift+方向键</kbd> - 快速微调</li>
                    </ul>
                    <h4>鼠标操作</h4>
                    <ul>
                        <li>滚轮 - 缩放坐标系</li>
                        <li>拖动 - 移动坐标系</li>
                        <li>点击方程 - 选中方程</li>
                        <li>双击空白 - 取消选中</li>
                        <li>拖动方程 - 移动方程</li>
                    </ul>
                </div>
            </div>
            
            <div class="right-panel">
                <div class="canvas-toolbar">
                    <div class="mode-toggle">
                        <button onclick="switchTo2D()" id="btn-2d" class="mode-btn active" title="2D模式">2D</button>
                        <button onclick="switchTo3D()" id="btn-3d" class="mode-btn" title="3D模式">3D</button>
                    </div>

                    <button onclick="toggleSettingsMenu()" class="toolbar-btn settings-btn" title="设置">⚙️</button>
                    <div id="settings-menu" class="settings-menu hidden">
                        <div class="settings-menu-item">
                            <label>
                                <input type="checkbox" id="show-grid" checked onchange="toggleGrid()">
                                显示网格线
                            </label>
                        </div>
                        <div class="settings-menu-item">
                            <label>
                                <input type="checkbox" id="dark-mode" onchange="toggleDarkMode()">
                                深色模式
                            </label>
                        </div>
                        <div class="settings-menu-item">
                            <label>
                                <input type="checkbox" id="show-intersections" checked onchange="toggleIntersections()">
                                显示交点
                            </label>
                        </div>
                        <div class="settings-menu-item">
                            <label>
                                交点颜色:
                                <input type="color" id="intersection-color" value="#ff00ff" onchange="updateIntersectionColor()" title="选择交点颜色">
                            </label>
                        </div>
                        <div class="settings-menu-divider"></div>
                        <div class="settings-menu-item">
                            <label>X轴范围:</label>
                            <div class="range-inputs">
                                <input type="number" id="x-min" value="-10" onchange="updateAxisRange()">
                                <span>到</span>
                                <input type="number" id="x-max" value="10" onchange="updateAxisRange()">
                            </div>
                        </div>
                        <div class="settings-menu-item">
                            <label>Y轴范围:</label>
                            <div class="range-inputs">
                                <input type="number" id="y-min" value="-10" onchange="updateAxisRange()">
                                <span>到</span>
                                <input type="number" id="y-max" value="10" onchange="updateAxisRange()">
                            </div>
                        </div>
                        <div class="settings-menu-divider"></div>
                        <div class="settings-menu-item" id="auto-rotate-speed-control" style="display: none;">
                            <label>自动旋转速度:</label>
                            <input type="range" id="auto-rotate-slider" min="1" max="10" value="5" onchange="updateAutoRotateSpeed(this.value)">
                        </div>
                        <div class="settings-menu-item" id="fog-control" style="display: none;">
                            <label>
                                <input type="checkbox" id="fog-toggle" onchange="toggleFog()"> 启用深度雾化
                            </label>
                        </div>
                    </div>
                </div>
                
                <div class="canvas-container">
                    <canvas id="coordinate-system" width="800" height="600"></canvas>
                    <div id="coordinate-display" class="coordinate-display"></div>
                    <div class="view-controls-canvas" id="view-controls-canvas" style="display: none;">
                        <button onclick="app.toggleAutoRotate()" id="btn-autorotate" class="toolbar-btn" title="自动旋转">🔄</button>
                        <button onclick="app.resetViewFront()" class="toolbar-btn" title="正视图">前</button>
                        <button onclick="app.resetViewTop()" class="toolbar-btn" title="俯视图">上</button>
                        <button onclick="app.resetViewSide()" class="toolbar-btn" title="侧视图">侧</button>
                        <button onclick="app.import3DData()" class="toolbar-btn" title="导入3D数据">📂</button>
                        <button onclick="app.export3DData()" class="toolbar-btn" title="导出3D数据">💾</button>
                    </div>
                    <div id="legend-display" class="legend-display"></div>
                </div>
                
                <div class="controls">
                    <p>鼠标滚轮：缩放坐标系 | 鼠标拖动：移动坐标系 | 鼠标移动：显示坐标</p>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
